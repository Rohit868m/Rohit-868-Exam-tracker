<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC CGL Ultimate Study Tracker 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2430;--border:#30363d;
  --text:#e6edf3;--muted:#7d8590;--accent:#f7c948;--green:#3fb950;
  --blue:#58a6ff;--purple:#bc8cff;--orange:#ffa657;--red:#f85149;
  --eng:#e05299;--math:#52c0e0;--rea:#bc8cff;--gk:#f7c948;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
/* HEADER */
.hdr{background:linear-gradient(135deg,#1a0533,#0d1117 50%,#001a33);border-bottom:2px solid var(--accent);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:10px;flex-wrap:wrap}
.logo{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;color:var(--accent);letter-spacing:2px;white-space:nowrap}
.logo span{color:var(--text)}
.hdr-stats{display:flex;gap:14px;flex-wrap:wrap}
.hs{text-align:center}
.hs-n{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;color:var(--accent);line-height:1}
.hs-l{font-size:0.6rem;color:var(--muted);text-transform:uppercase}
.hdr-btns{display:flex;gap:8px;align-items:center}
/* SECTION TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;padding:0 10px}
.tab{padding:12px 20px;cursor:pointer;border-bottom:3px solid transparent;font-weight:700;font-size:0.85rem;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:8px}
.tab:hover{color:var(--accent)}
.tab.active{border-bottom-color:var(--accent);color:var(--accent)}
.tab .tpct{font-size:0.65rem;background:var(--surface2);padding:2px 7px;border-radius:99px;color:var(--muted)}
/* LAYOUT */
.layout{display:flex;height:calc(100vh - 102px)}
.sidebar{width:210px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:10px 0}
.main{flex:1;overflow-y:auto;padding:18px}
/* NAV */
.nav-lbl{padding:6px 12px 2px;font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;border-left:3px solid transparent;font-size:0.8rem;font-weight:600;transition:all .15s}
.ni:hover{background:var(--surface2)}
.ni.active{background:var(--surface2);border-left-color:var(--accent);color:var(--accent)}
.ni .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ni .nc{margin-left:auto;font-size:0.62rem;background:var(--border);padding:2px 6px;border-radius:99px;color:var(--muted)}
.npb{height:3px;background:var(--border);margin:0 14px 4px;border-radius:99px;overflow:hidden}
.npbf{height:100%;border-radius:99px;transition:width .4s}
/* BUTTONS */
.btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Nunito',sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent)}
.btn-primary:hover{background:#e5b800;color:#000}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-red:hover{background:rgba(248,81,73,.1)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-sm{padding:4px 10px;font-size:0.72rem}
/* CONTROLS */
.ctrl{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:160px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.82rem;outline:none}
.search:focus{border-color:var(--accent)}
.fbtn{padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.72rem;cursor:pointer;transition:all .15s;font-family:'Nunito',sans-serif}
.fbtn.active{background:var(--surface2);color:var(--accent);border-color:var(--accent)}
/* CARDS */
.subj-hdr{display:flex;align-items:center;gap:12px;padding:16px 18px;border-radius:12px;margin-bottom:16px;position:relative;overflow:hidden}
.subj-icon{font-size:2rem}
.subj-title{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700}
.subj-meta{font-size:0.72rem;color:var(--muted);margin-top:2px}
.bdg{padding:2px 9px;border-radius:99px;font-size:0.65rem;font-weight:700;text-transform:uppercase}
.bdg-y{background:rgba(247,201,72,.15);color:var(--accent);border:1px solid rgba(247,201,72,.3)}
.bdg-g{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.bdg-r{background:rgba(248,81,73,.15);color:var(--red);border:1px solid rgba(248,81,73,.3)}
.spw{margin-left:auto;text-align:right;min-width:90px}
.spct{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;line-height:1}
.sbar{height:5px;background:rgba(255,255,255,.1);border-radius:99px;margin-top:5px;overflow:hidden}
.sbarf{height:100%;border-radius:99px;transition:width .5s}
/* TOPIC CARDS */
.tc{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.tc:hover{border-color:var(--muted)}
.th{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer}
.tex{font-size:0.65rem;color:var(--muted);transition:transform .2s}
.tex.open{transform:rotate(90deg)}
.tn{font-weight:700;font-size:0.87rem;flex:1}
.tqb{font-size:0.65rem;background:var(--surface2);padding:2px 7px;border-radius:99px;color:var(--muted)}
.tmb{width:55px;height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.tmbf{height:100%;border-radius:99px;transition:width .4s}
.imp{font-size:0.62rem;padding:2px 6px;border-radius:4px;font-weight:700}
.imp-High{background:rgba(248,81,73,.2);color:#f85149}
.imp-Medium{background:rgba(247,166,87,.2);color:#ffa657}
.imp-Low{background:rgba(63,185,80,.2);color:#3fb950}
/* SUBTOPICS */
.sts{padding:0 14px 10px;display:none}
.sts.open{display:block}
.sr{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;transition:background .15s}
.sr:hover{background:var(--surface2)}
.sr.hl{background:rgba(247,201,72,.08)!important;border-radius:7px}
.chk{width:17px;height:17px;border-radius:4px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk.done{background:var(--green);border-color:var(--green)}
.chk.done::after{content:'✓';color:#000;font-size:0.65rem;font-weight:900}
.sn{flex:1;font-size:0.81rem}
.sn.done{color:var(--muted);text-decoration:line-through}
.stags{display:flex;gap:3px}
.tag{font-size:0.58rem;padding:1px 5px;border-radius:3px;font-weight:700}
.tag-fire{background:rgba(248,81,73,.2);color:#f85149}
.tag-star{background:rgba(247,201,72,.2);color:var(--accent)}
.tag-qs{background:rgba(88,166,255,.2);color:var(--blue)}
.sact{display:flex;gap:4px;flex-shrink:0}
.ib{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.72rem;transition:all .15s;flex-shrink:0}
.ib:hover{border-color:var(--accent);color:var(--accent)}
.ib.del{border-color:rgba(248,81,73,.5);color:var(--red);background:rgba(248,81,73,.1)}
.ib.del:hover{border-color:var(--red);background:rgba(248,81,73,.2)}
/* SYNC */
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
.sync-bar{position:fixed;top:0;left:0;right:0;height:2px;background:var(--green);z-index:9999;transform:scaleX(0);transform-origin:left;transition:transform .4s ease;pointer-events:none}
.sync-bar.syncing{animation:syncpulse 1.2s infinite}
@keyframes syncpulse{0%{transform:scaleX(0)}50%{transform:scaleX(.6)}100%{transform:scaleX(1)}}
.sync-bar.done{transform:scaleX(1);transition:transform .3s}
.google-btn{background:#fff;color:#333;border:1px solid #ddd;border-radius:8px;padding:8px 16px;font-family:Nunito,sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;display:flex;align-items:center;gap:8px;transition:box-shadow .2s;width:100%}
.google-btn:hover{box-shadow:0 2px 12px rgba(0,0,0,.2)}
.sync-info{background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.3);border-radius:8px;padding:10px 12px;font-size:.74rem;color:var(--muted);margin-top:10px}
.sl{font-size:0.68rem;color:var(--blue);text-decoration:none;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.atb{width:100%;margin-top:5px;padding:8px;border:1px dashed var(--border);background:transparent;border-radius:7px;color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif;font-size:0.78rem;transition:all .15s;text-align:center}
.atb:hover{border-color:var(--accent);color:var(--accent);background:var(--surface2)}
/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:center;justify-content:center;padding:10px}
.mo.open{display:flex}
.md{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;width:480px;max-width:100%;max-height:92vh;overflow-y:auto}
.md h3{font-family:'Rajdhani',sans-serif;font-size:1.25rem;font-weight:700;margin-bottom:14px}
.md label{font-size:0.75rem;color:var(--muted);display:block;margin-bottom:3px;margin-top:10px}
.md input,.md select,.md textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.83rem;outline:none}
.md input:focus,.md select:focus,.md textarea:focus{border-color:var(--accent)}
.mda{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;flex-wrap:wrap}
/* DASH GRID */
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.dc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.dc:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.35)}
.dc-ico{font-size:2rem;margin-bottom:8px}
.dc-title{font-weight:800;font-size:1rem;margin-bottom:3px}
.dc-sub{font-size:0.7rem;color:var(--muted)}
.dc-pct{font-family:'Rajdhani',sans-serif;font-size:2rem;font-weight:700;margin-top:8px;line-height:1}
.dmb{height:5px;background:var(--border);border-radius:99px;margin-top:7px;overflow:hidden}
.dmbf{height:100%;border-radius:99px}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--green);color:var(--green);padding:9px 16px;border-radius:8px;font-size:0.82rem;font-weight:700;z-index:9999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
/* STAT CARDS */
.statrow{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.sc-n{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;line-height:1}
.sc-l{font-size:0.65rem;color:var(--muted);margin-top:3px;text-transform:uppercase}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:0.79rem}
.tbl th{background:var(--surface2);padding:9px 11px;text-align:left;font-size:0.68rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.tbl td{padding:9px 11px;border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surface2)}
/* VOCAB */
.vcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.vword{font-weight:800;font-size:1rem;min-width:130px;color:var(--accent)}
.vmean{flex:1;font-size:0.83rem;color:var(--text)}
.vex{font-size:0.72rem;color:var(--muted);margin-top:3px;font-style:italic}
/* ALARM */
.alarm-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px}
.alarm-time{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;color:var(--accent);min-width:80px}
.alarm-info{flex:1}
.alarm-name{font-weight:700;font-size:0.9rem}
.alarm-sub{font-size:0.72rem;color:var(--muted)}
.alarm-tog{width:44px;height:24px;border-radius:99px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.alarm-tog.on{background:var(--green)}
.alarm-tog.off{background:var(--border)}
.alarm-tog::after{content:'';position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s}
.alarm-tog.on::after{left:23px}
.alarm-tog.off::after{left:3px}
/* GRAPH */
.graph-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.graph-title{font-weight:700;font-size:0.88rem;margin-bottom:12px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:140px;padding-bottom:24px;position:relative}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;height:100%}
.bar-fill{width:100%;border-radius:4px 4px 0 0;position:absolute;bottom:20px;transition:height .5s}
.bar-lbl{position:absolute;bottom:0;font-size:0.6rem;color:var(--muted);text-align:center;width:100%}
.bar-val{position:absolute;font-size:0.58rem;color:var(--accent);text-align:center;width:100%}
/* PRINT */
@media print{
  .tabs,.sidebar,.hdr-btns,.ctrl,.sact,.atb,.btn,.alarm-card{display:none!important}
  .layout{height:auto!important;flex-direction:column}
  .main{overflow:visible!important;padding:10px}
  body{background:#fff!important;color:#000!important}
  .tc{border:1px solid #ccc!important;break-inside:avoid}
  .sts{display:block!important}
  .surface,.surface2{background:#fff!important}
}
@media(max-width:700px){.sidebar{display:none}.layout{height:auto;flex-direction:column}.hdr-stats{display:none}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="logo">SSC <span>CGL</span> 2026</div>
    <div style="font-size:.6rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase">Ultimate Study Tracker</div>
  </div>
  <div class="hdr-stats">
    <div class="hs"><div class="hs-n" id="hs-done">0</div><div class="hs-l">Done</div></div>
    <div class="hs"><div class="hs-n" id="hs-total">0</div><div class="hs-l">Total</div></div>
    <div class="hs"><div class="hs-n" id="hs-streak">0🔥</div><div class="hs-l">Streak</div></div>
    <div class="hs"><div class="hs-n" id="hs-pct">0%</div><div class="hs-l">Done</div></div>
    <div class="hs"><div class="hs-n" id="hs-hrs">0h</div><div class="hs-l">Today</div></div>
  </div>
  <div class="hdr-btns">
    <div id="sync-status-pill" style="display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:4px 10px;cursor:pointer" onclick="openLoginModal()">
      <span class="sync-dot" id="sync-dot" style="background:var(--muted)"></span>
      <span id="user-label">Not synced</span>
    </div>
    <button class="btn" onclick="openLoginModal()">👤 <span id="user-label2">Login</span></button>
    <button class="btn" onclick="openAlarmModal()">🔔 Alarms</button>
    <button class="btn" onclick="window.print()">🖨️ Print</button>
    <button class="btn" onclick="autoDailyBackup()" title="Download daily backup" style="border-color:var(--blue);color:var(--blue)">💾 Backup</button>
    <button class="btn btn-red" onclick="confirmDeleteHistory()">🗑 Delete</button>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

<div class="mo" id="modal"><div class="md" id="modal-inner"></div></div>
<div class="sync-bar" id="sync-bar"></div>
<div class="toast" id="toast"></div>
<div id="backup-reminder" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--blue);border-radius:10px;padding:10px 18px;z-index:9998;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:90vw">
  <span style="font-size:.83rem;color:var(--blue)">💾 No backup today yet</span>
  <button onclick="autoDailyBackup()" style="background:var(--blue);color:#000;border:none;border-radius:6px;padding:5px 12px;font-family:Nunito,sans-serif;font-weight:700;font-size:.75rem;cursor:pointer">Download Backup</button>
  <button onclick="document.getElementById('backup-reminder').style.display='none'" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1rem">✕</button>
</div>

<script>
// ===== SECTION DEFINITIONS =====
const SECTIONS = [
  {id:'dashboard',label:'Dashboard',icon:'📊',color:'#f7c948',isPage:true},
  {id:'english',label:'English',icon:'📖',color:'#e05299'},
  {id:'math',label:'Math',icon:'📐',color:'#52c0e0'},
  {id:'reasoning',label:'Reasoning',icon:'🧠',color:'#bc8cff'},
  {id:'gkgs',label:'GK/GS',icon:'🌐',color:'#f7c948'},
  {id:'vocab',label:'Vocabulary',icon:'📝',color:'#3fb950',isPage:true},
  {id:'daily',label:'Daily Log',icon:'📅',color:'#58a6ff',isPage:true},
  {id:'study',label:'Study Timer',icon:'⏱️',color:'#ffa657',isPage:true},
  {id:'alarms',label:'Alarms',icon:'🔔',color:'#f85149',isPage:true},
];

// ===== SUBJECT DATA =====
const SUBJECTS = {
  english:[
    {id:'eng_rc',name:'Reading Comprehension',importance:'High',color:'#e05299',subtopics:[
      {id:'e1',name:'Para Comprehension — Inference & Main Idea',tags:['fire'],qs:10},
      {id:'e2',name:'Para Comprehension — Vocabulary in Context',tags:['star'],qs:5},
      {id:'e3',name:'Passage Based Qs — Tone & Attitude',tags:['star'],qs:5},
    ]},
    {id:'eng_vocab',name:'Vocabulary',importance:'High',color:'#e05299',subtopics:[
      {id:'e4',name:'Synonyms & Antonyms',tags:['fire','star'],qs:8},
      {id:'e5',name:'Idioms & Phrases',tags:['fire'],qs:6},
      {id:'e6',name:'One Word Substitution',tags:['fire','star'],qs:5},
      {id:'e7',name:'Homonyms & Confusable Words',tags:['star'],qs:3},
    ]},
    {id:'eng_gram',name:'Grammar & Error Detection',importance:'High',color:'#e05299',subtopics:[
      {id:'e8',name:'Spot the Error — Subject-Verb Agreement',tags:['fire','star'],qs:6},
      {id:'e9',name:'Fill in the Blanks — Articles, Prepositions',tags:['fire'],qs:5},
      {id:'e10',name:'Spellings / Detecting Misspelt Words',tags:['star'],qs:3},
      {id:'e11',name:'Active & Passive Voice',tags:['fire'],qs:4},
      {id:'e12',name:'Direct & Indirect Speech (Narration)',tags:['fire'],qs:4},
      {id:'e13',name:'Sentence Improvement',tags:['star'],qs:4},
      {id:'e14',name:'Tenses — All Forms',tags:['fire'],qs:0},
      {id:'e15',name:'Clauses — Noun, Adjective, Adverb',tags:[],qs:0},
    ]},
    {id:'eng_sent',name:'Sentence & Para Arrangement',importance:'Medium',color:'#e05299',subtopics:[
      {id:'e16',name:'Shuffling of Sentence Parts (Jumbled Sentences)',tags:['fire'],qs:4},
      {id:'e17',name:'Para Jumbles — Shuffling of Sentences in Passage',tags:['star'],qs:3},
      {id:'e18',name:'Cloze Passage',tags:['fire'],qs:5},
    ]},
  ],
  math:[
    {id:'m_num',name:'Number System & Arithmetic',importance:'High',color:'#52c0e0',subtopics:[
      {id:'m1',name:'Number System — HCF, LCM, Integers',tags:['fire'],qs:3},

function load(){try{const d=localStorage.getItem('ssc_ult_v3');if(d)Object.assign(S,JSON.parse(d));}catch(e){}}
function save(){try{localStorage.setItem('ssc_ult_v3',JSON.stringify(S));}catch(e){}}
load();

// ===== HELPERS =====
function today(){return new Date().toISOString().split('T')[0]}
function toast(msg,col='var(--green)'){const t=document.getElementById('toast');t.textContent=msg;t.style.borderColor=col;t.style.color=col;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2300)}

function getTopicsForSection(secId){
  if(SUBJECTS[secId]) return SUBJECTS[secId];
  const cs=S.customSubjects.find(s=>s.id===secId);
  if(!cs) return [];
  return S.customTopics.filter(t=>t.subjectId===secId).map(t=>({
    ...t,subtopics:S.customSubtopics.filter(s=>s.topicId===t.id)
  }));
}

function getSectionCompletion(secId){
  const topics=getTopicsForSection(secId);
  let total=0,done=0;
  topics.forEach(t=>{
    [...t.subtopics,...S.customSubtopics.filter(s=>s.topicId===t.id&&!t.subtopics.find(x=>x.id===s.id))].forEach(s=>{
      total++;if(S.completed[s.id]?.done)done++;
    });
  });
  return{total,done};
}

function getOverall(){
  let total=0,done=0;
  [...['english','math','reasoning','gkgs'],...S.customSubjects.map(s=>s.id)].forEach(sid=>{
    const r=getSectionCompletion(sid);total+=r.total;done+=r.done;
  });
  return{total,done};
}

function getStreak(){
  let streak=0;const d=new Date();
  while(true){
    const k=d.toISOString().split('T')[0];
    if((S.dailyLog[k]&&S.dailyLog[k].length>0)||(S.studyHours[k]&&S.studyHours[k]>0)){streak++;d.setDate(d.getDate()-1);}
    else break;
  }
  return streak;
}

function getTodayHours(){
  let h=S.studyHours[today()]||0;
  if(S.timerRunning&&S.timerStart){h+=(Date.now()-S.timerStart)/3600000;}
  return h;
}

// ===== TOGGLE =====
function toggleDone(id){
  const was=S.completed[id]?.done;
  S.completed[id]={done:!was,date:today()};
  if(!was){
    if(!S.dailyLog[today()])S.dailyLog[today()]=[];
    if(!S.dailyLog[today()].includes(id))S.dailyLog[today()].push(id);
    toast('✅ Marked complete!');
  }else{
    if(S.dailyLog[today()])S.dailyLog[today()]=S.dailyLog[today()].filter(x=>x!==id);
    toast('↩️ Marked pending','var(--orange)');
  }
  save();updateHeader();renderSidebar();renderTabCounts();
  const el=document.getElementById(`sr-${id}`);
  if(el){
    const chk=el.querySelector('.chk');const sn=el.querySelector('.sn');
    if(chk){chk.classList.toggle('done',!was);}
    if(sn){sn.classList.toggle('done',!was);}
  }
}

function toggleHL(id){
  S.highlighted[id]=!S.highlighted[id];
  save();
  const el=document.getElementById(`sr-${id}`);
  if(el)el.classList.toggle('hl',!!S.highlighted[id]);
  const btn=el?.querySelector('.hl-btn');
  if(btn)btn.style.color=S.highlighted[id]?'var(--accent)':'';
}

// ===== HEADER =====
function updateHeader(){
  const{total,done}=getOverall();
  document.getElementById('hs-done').textContent=done;
  document.getElementById('hs-total').textContent=total;
  document.getElementById('hs-streak').textContent=getStreak()+'🔥';
  document.getElementById('hs-pct').textContent=total?Math.round(done/total*100)+'%':'0%';
  document.getElementById('hs-hrs').textContent=getTodayHours().toFixed(1)+'h';
  document.getElementById('user-label').textContent=S.user?S.user.name.split(' ')[0]:'Login';
}

// ===== TABS =====
function renderTabs(){
  const allSections=[...SECTIONS];
  S.customSubjects.forEach(cs=>allSections.splice(5,0,{...cs,isCustom:true}));
  let html='';
  allSections.forEach(sec=>{
    const isPage=sec.isPage;
    let pct='';
    if(!isPage&&sec.id!=='dashboard'){
      const{total,done}=getSectionCompletion(sec.id);
      pct=`<span class="tpct">${total?Math.round(done/total*100):0}%</span>`;
    }
    html+=`<div class="tab ${S.activeSection===sec.id?'active':''}" onclick="setSection('${sec.id}')" style="${S.activeSection===sec.id?'color:'+sec.color:''}">
      ${sec.icon} ${sec.label} ${pct}
      ${sec.isCustom?`<button onclick="event.stopPropagation();confirmDeleteSubject('${sec.id}','${sec.label||sec.id}')" title="Delete subject" style="margin-left:4px;background:rgba(248,81,73,.15);border:1px solid rgba(248,81,73,.5);color:var(--red);border-radius:4px;padding:1px 6px;cursor:pointer;font-size:.68rem;font-weight:700;line-height:1.4">🗑</button>`:''}
    </div>`;
  });
  html+=`<div class="tab" onclick="openAddSubjectModal()" style="color:var(--muted)">➕ Add Subject</div>`;
  document.getElementById('tabs').innerHTML=html;
}

function renderTabCounts(){
  document.querySelectorAll('.tab .tpct').forEach(el=>{
    const tab=el.closest('.tab');
    const secId=tab?.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
    if(secId){
      const{total,done}=getSectionCompletion(secId);
      el.textContent=total?Math.round(done/total*100)+'%':'0%';
    }
  });
}

function setSection(id,subId=null){
  S.activeSection=id;S.activeSubjectId=subId;
  S.filter='all';S.searchQ='';
  renderAll();
}

// ===== SIDEBAR =====
function renderSidebar(){
  const el=document.getElementById('sidebar');
  if(['dashboard','vocab','daily','study','alarms'].includes(S.activeSection)){el.innerHTML='';return;}
  const topics=getTopicsForSection(S.activeSection);
  const sec=SECTIONS.find(s=>s.id===S.activeSection)||S.customSubjects.find(s=>s.id===S.activeSection);
  let html=`<div class="nav-lbl">${sec?.label||''} Topics</div>`;
  topics.forEach(t=>{
    const subs=[...t.subtopics,...S.customSubtopics.filter(s=>s.topicId===t.id&&!t.subtopics.find(x=>x.id===s.id))];
    const done=subs.filter(s=>S.completed[s.id]?.done).length;
    const pct=subs.length?Math.round(done/subs.length*100):0;
    const color=t.color||sec?.color||'var(--accent)';
    html+=`<div class="ni ${S.activeSubjectId===t.id?'active':''}" onclick="S.activeSubjectId='${t.id}';renderMain()">
      <span class="dot" style="background:${color}"></span>
      <span style="flex:1;font-size:.75rem">${t.name.replace(/ 🔥+/,'')}</span>
      <span class="nc">${done}/${subs.length}</span>
    </div>
    <div class="npb"><div class="npbf" style="width:${pct}%;background:${color}"></div></div>`;
  });
  el.innerHTML=html;
}

// ===== MAIN RENDER =====
function renderAll(){updateHeader();renderTabs();renderSidebar();renderMain();}
function renderMain(){
  const m=document.getElementById('main');
  if(S.activeSection==='dashboard'){m.innerHTML=renderDashboard();return;}
  if(S.activeSection==='vocab'){m.innerHTML=renderVocab();bindVocabEvents();return;}
  if(S.activeSection==='daily'){m.innerHTML=renderDaily();return;}
  if(S.activeSection==='study'){m.innerHTML=renderStudy();bindStudyEvents();return;}
  if(S.activeSection==='alarms'){m.innerHTML=renderAlarms();return;}
  m.innerHTML=renderSubjectView(S.activeSection);
}

function renderStudyGraph(){
  const days=[];const now=new Date();
  for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);days.push(d.toISOString().split('T')[0]);}
  const maxH=Math.max(...days.map(d=>S.studyHours[d]||0),1);
  let html=`<div class="graph-wrap"><div class="graph-title">📈 Study Hours — Last 7 Days</div>
    <div class="bar-chart">`;
  days.forEach(d=>{
    const h=S.studyHours[d]||0;
    const pct=Math.round(h/maxH*100);
    const label=new Date(d).toLocaleDateString('en',{weekday:'short'});
    const isToday=d===today();
    html+=`<div class="bar-col">
      <div class="bar-val" style="bottom:${pct+22}px">${h>0?h.toFixed(1)+'h':''}</div>
      <div class="bar-fill" style="height:${pct}%;background:${isToday?'var(--accent)':'var(--blue)'};opacity:${isToday?1:.7}"></div>
      <div class="bar-lbl">${label}${isToday?'*':''}</div>
    </div>`;
  });
  html+=`</div></div>`;
  return html;
}

// ===== SUBJECT VIEW =====
function renderSubjectView(secId){
  const sec=SECTIONS.find(s=>s.id===secId)||S.customSubjects.find(s=>s.id===secId);
  if(!sec)return'';
  const topics=getTopicsForSection(secId);
  const{total,done}=getSectionCompletion(secId);
  const pct=total?Math.round(done/total*100):0;
  const color=sec.color||'var(--accent)';
  const q=S.searchQ.toLowerCase();

  const filtered=S.activeSubjectId?topics.filter(t=>t.id===S.activeSubjectId):topics;

  let html=`<div class="ctrl">
    <input class="search" type="text" placeholder="🔍 Search subtopics..." value="${S.searchQ}" oninput="S.searchQ=this.value;renderMain()">
    ${['all','pending','done','highlighted','fire'].map(f=>`<button class="fbtn ${S.filter===f?'active':''}" onclick="S.filter='${f}';renderMain()">${f==='done'?'✅ Done':f==='highlighted'?'⭐ Starred':f==='fire'?'🔥 Fire':f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}
    <button class="btn btn-primary" onclick="openAddTopicModal('${secId}')">+ Topic</button>
    <button class="btn" onclick="window.print()">🖨️</button>
  </div>
  <div class="subj-hdr" style="background:linear-gradient(135deg,${color}22,${color}08);border:1px solid ${color}44">
    <div class="subj-icon">${sec.icon||'📌'}</div>
    <div style="flex:1">
      <div class="subj-title" style="color:${color}">${sec.label}</div>
      <div class="subj-meta">${total} subtopics · ${done} completed</div>
      <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
        <span class="bdg bdg-y">📊 ${total} Total</span>
        <span class="bdg bdg-g">✅ ${done} Done</span>
        ${pct===100?'<span class="bdg" style="background:rgba(63,185,80,.2);color:var(--green);border:1px solid rgba(63,185,80,.4)">🎉 Complete!</span>':''}
        ${S.customSubjects.find(s=>s.id===secId)?`<button onclick="confirmDeleteSubject('${secId}','${sec.label}')" style="background:rgba(248,81,73,.15);border:1px solid rgba(248,81,73,.5);color:var(--red);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:.72rem;font-weight:700;font-family:Nunito,sans-serif">🗑 Delete Subject</button>`:''}
      </div>
    </div>
    <div class="spw">
      <div class="spct" style="color:${color}">${pct}%</div>
      <div style="font-size:.65rem;color:var(--muted)">${done}/${total}</div>
      <div class="sbar"><div class="sbarf" style="width:${pct}%;background:${color}"></div></div>
    </div>
  </div>`;

  filtered.forEach(topic=>{
    const builtinSubs=topic.subtopics||[];
    const customSubs=S.customSubtopics.filter(s=>s.topicId===topic.id&&!builtinSubs.find(x=>x.id===s.id));
    const allSubs=[...builtinSubs,...customSubs];
    const tColor=topic.color||color;

    const hiddenIds=S.hiddenSubtopics||[];
    const filteredSubs=allSubs.filter(s=>{
      if(hiddenIds.includes(s.id)&&S.filter!=='hidden')return false;
      if(q&&!s.name.toLowerCase().includes(q))return false;
      if(S.filter==='done'&&!S.completed[s.id]?.done)return false;
      if(S.filter==='pending'&&S.completed[s.id]?.done)return false;
      if(S.filter==='highlighted'&&!S.highlighted[s.id])return false;
      if(S.filter==='fire'&&!s.tags?.includes('fire'))return false;
      return true;
    });
    if(q&&filteredSubs.length===0&&S.filter!=='all')return;

    const tDone=allSubs.filter(s=>S.completed[s.id]?.done).length;
    const tTotal=allSubs.length;
    const tPct=tTotal?Math.round(tDone/tTotal*100):0;
    const isOpen=!!S.openTopics[topic.id];

    html+=`<div class="tc">
      <div class="th" onclick="S.openTopics['${topic.id}']=!S.openTopics['${topic.id}'];renderMain()">
        <span class="tex ${isOpen?'open':''}">▶</span>
        <span class="tn">${topic.name}</span>
        ${topic.pyqQ?`<span class="tqb">📊 ${topic.pyqQ}Q</span>`:''}
        <span class="imp imp-${topic.importance||'Medium'}">${topic.importance||'Med'}</span>
        <span style="font-size:.68rem;color:var(--muted)">${tDone}/${tTotal}</span>
        <div class="tmb"><div class="tmbf" style="width:${tPct}%;background:${tColor}"></div></div>
        ${topic.isCustom||S.customTopics.find(t=>t.id===topic.id)?`<button class="ib del" onclick="event.stopPropagation();deleteCustomTopic('${topic.id}','${secId}')">🗑</button>`:''}
        <button class="btn btn-sm" onclick="event.stopPropagation();openAddSubtopicModal('${topic.id}','${secId}')">+Sub</button>
      </div>
      <div class="sts ${isOpen?'open':''}">`;

    filteredSubs.forEach(sub=>{
      const isDone=S.completed[sub.id]?.done;
      const isHL=S.highlighted[sub.id];
      const link=S.links[sub.id];
      const note=S.notes[sub.id];
      const isCustom=S.customSubtopics.some(s=>s.id===sub.id);
      html+=`<div class="sr ${isHL?'hl':''}" id="sr-${sub.id}">
        <div class="chk ${isDone?'done':''}" onclick="toggleDone('${sub.id}')"></div>
        <div class="sn ${isDone?'done':''}">${sub.name}${note?` <span style="color:var(--muted);font-size:.62rem" title="${note}">📝</span>`:''}${link?` <a class="sl" href="${link}" target="_blank" onclick="event.stopPropagation()">🔗</a>`:''}</div>
        <div class="stags">
          ${sub.tags?.includes('fire')?'<span class="tag tag-fire">🔥</span>':''}
          ${sub.tags?.includes('star')?'<span class="tag tag-star">⭐</span>':''}
          ${sub.qs?`<span class="tag tag-qs">${sub.qs}Q</span>`:''}
        </div>
        <div class="sact">
          <button class="ib hl-btn" onclick="toggleHL('${sub.id}')" title="${isHL?'Unstar':'Star'}" style="color:${isHL?'var(--accent)':''}">⭐</button>
          <button class="ib" onclick="openLinkModal('${sub.id}','${sub.name}')" title="Add Link/Note">🔗</button>
          <button class="ib del" onclick="deleteSubtopicEntry('${sub.id}',${isCustom})" title="Delete subtopic">🗑</button>
        </div>
      </div>`;
    });

    if(filteredSubs.length===0&&(q||S.filter!=='all')){
      html+=`<div style="color:var(--muted);font-size:.76rem;padding:8px">No matching subtopics</div>`;
    }
    html+=`<button class="atb" onclick="openAddSubtopicModal('${topic.id}','${secId}')">+ Add Subtopic</button>
      </div></div>`;
  });

  html+=`<button class="atb" style="margin-top:8px" onclick="openAddTopicModal('${secId}')">+ Add New Topic</button>`;
  return html;
}

function findSubById(id){
  for(const secId of['english','math','reasoning','gkgs']){

function bindStudyEvents(){

    },1000);

function formatTime(secs){
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=Math.floor(secs%60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

window.timerToggle=function(){
  if(S.timerRunning){
    S.timerElapsed+=(Date.now()-S.timerStart)/1000;

    if(!S.studyHours[today()])S.studyHours[today()]=0;
    S.studyHours[today()]+=S.timerElapsed/3600;S.timerElapsed=0;
    clearInterval(timerInterval);save();toast('⏱️ Session saved!');

    S.timerStart=Date.now();S.timerRunning=true;

window.readVocabFile=function(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('imp-text').value=e.target.result;
    document.getElementById('imp-preview').textContent=`File loaded: ${file.name}`;
  };
  reader.readAsText(file);

window.importVocab=function(){
  const text=document.getElementById('imp-text').value.trim();
  if(!text)return;
  const lines=text.split('\n').filter(l=>l.trim());
  let added=0;
  lines.forEach(line=>{
    line=line.trim();if(!line)return;
    let word,meaning;
    if(line.includes(':')){
      const parts=line.split(':');word=parts[0].trim();meaning=parts.slice(1).join(':').trim();
    } else if(line.includes('-')){
      const parts=line.split('-');word=parts[0].trim();meaning=parts.slice(1).join('-').trim();
    } else if(line.includes('\t')){
      const parts=line.split('\t');word=parts[0].trim();meaning=parts[1]?.trim()||'';
    } else {word=line;meaning='';}
    if(word&&word.length<60){
      if(!S.vocab.find(v=>v.word.toLowerCase()===word.toLowerCase())){
        S.vocab.push({word,meaning:meaning||'(Add meaning)',pos:'',example:'',added:today()});
        added++;
      }
    }
  });
  save();closeModal();renderMain();toast(`✅ ${added} words imported!`);
}

window.startVocabQuiz=function(){
  if(S.vocab.length===0)return;
  const unasked=S.vocab.filter(v=>v.lastAsked!==today());
  const pool=unasked.length>0?unasked:S.vocab;
  const v=pool[Math.floor(Math.random()*pool.length)];

// ===================================================================
// ===== GOOGLE DRIVE SYNC ENGINE ====================================
// ===================================================================
// Uses Google Drive AppData folder (hidden, user-owned, no extra perms)
// File stored: SSC_CGL_Tracker_Data.json in appDataFolder
// Flow: Sign in → get token → read file → merge → write file
// Auto-sync every 60s when signed in
// ===================================================================

const GAPI_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID'; // ← Replace with your Client ID
const GAPI_SCOPE     = 'https://www.googleapis.com/auth/drive.appdata';
const DRIVE_FILE_NAME= 'SSC_CGL_Tracker_Data.json';

let gToken = null;       // current access token
let gFileId = null;      // Drive file ID once found/created
let syncInterval = null;
let lastSyncTime = null;
let syncPending   = false;

// ── Token management ────────────────────────────────────────────────
function getStoredToken(){
  try{
    const t=localStorage.getItem('ssc_gtoken');
    if(!t)return null;
    const obj=JSON.parse(t);
    if(Date.now() > obj.expires) {localStorage.removeItem('ssc_gtoken');return null;}
    return obj;
  }catch(e){return null;}
}
function storeToken(tokenObj){
  const obj={...tokenObj, expires: Date.now() + (tokenObj.expires_in||3600)*1000 - 60000};
  localStorage.setItem('ssc_gtoken', JSON.stringify(obj));
  gToken = obj.access_token;
}
function clearToken(){localStorage.removeItem('ssc_gtoken');gToken=null;gFileId=null;}

// ── Sync status UI ──────────────────────────────────────────────────
function setSyncStatus(status, label){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('user-label');
  const lbl2=document.getElementById('user-label2');
  const bar=document.getElementById('sync-bar');
  const colors={syncing:'#f7c948',ok:'#3fb950',error:'#f85149',off:'#7d8590'};
  if(dot) dot.style.background=colors[status]||colors.off;
  if(lbl) lbl.textContent=label;
  if(lbl2) lbl2.textContent=S.user? S.user.name.split(' ')[0] : 'Login';
  if(bar){
    bar.className='sync-bar'+(status==='syncing'?' syncing':status==='ok'?' done':'');
    if(status==='ok') setTimeout(()=>{if(bar)bar.className='sync-bar';},1500);
  }
}

// ── Google Sign-In (GIS) ────────────────────────────────────────────
function initGoogleAuth(){
  if(typeof google==='undefined'||!google.accounts){
    setTimeout(initGoogleAuth,500);return;
  }
  // Restore existing token
  const stored=getStoredToken();
  if(stored){gToken=stored.access_token;onSignedIn();}
}

function googleSignIn(){
  if(typeof google==='undefined'||!google.accounts){
    toast('⚠️ Google API not loaded. Check internet.','var(--red)');return;
  }
  const client=google.accounts.oauth2.initTokenClient({
    client_id: GAPI_CLIENT_ID,
    scope: GAPI_SCOPE,
    callback:(tokenResponse)=>{
      if(tokenResponse.error){
        toast('❌ Sign-in failed: '+tokenResponse.error,'var(--red)');return;
      }
      storeToken(tokenResponse);
      // Get user info
      fetch('https://www.googleapis.com/oauth2/v3/userinfo',{
        headers:{Authorization:'Bearer '+gToken}
      }).then(r=>r.json()).then(info=>{
        S.user={name:info.name||info.email,email:info.email,picture:info.picture};
        save();
        onSignedIn();
        closeModal();
        toast('✅ Signed in as '+S.user.name);
      }).catch(()=>{
        S.user={name:'Google User',email:'unknown'};save();
        onSignedIn();closeModal();toast('✅ Signed in!');
      });
    }
  });
  client.requestAccessToken();
}

function onSignedIn(){
  setSyncStatus('syncing','Syncing…');
  startAutoSync();
  syncNow(true); // initial sync: pull then push
}

// ── Drive API helpers ────────────────────────────────────────────────
async function driveRequest(url, method='GET', body=null, contentType='application/json'){
  const opts={method, headers:{Authorization:'Bearer '+gToken}};
  if(body!==null){opts.headers['Content-Type']=contentType;opts.body=body;}
  const res=await fetch(url,opts);
  if(res.status===401){clearToken();setSyncStatus('error','Token expired — Re-sign in');return null;}
  return res;
}

async function findOrCreateFile(){
  if(gFileId)return gFileId;
  // Search in appDataFolder
  const search=await driveRequest(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%22${DRIVE_FILE_NAME}%22&fields=files(id,name,modifiedTime)`
  );
  if(!search)return null;
  const data=await search.json();
  if(data.files&&data.files.length>0){
    gFileId=data.files[0].id;
    return gFileId;
  }
  // Create new file
  const meta=JSON.stringify({name:DRIVE_FILE_NAME,parents:['appDataFolder']});
  const blob=new Blob([JSON.stringify({})],{type:'application/json'});
  const form=new FormData();
  form.append('metadata',new Blob([meta],{type:'application/json'}));
  form.append('file',blob);
  const create=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{
    method:'POST',headers:{Authorization:'Bearer '+gToken},body:form
  });
  if(!create)return null;
  const created=await create.json();
  gFileId=created.id;
  return gFileId;
}

async function pullFromDrive(){
  const fileId=await findOrCreateFile();
  if(!fileId)return null;
  const res=await driveRequest(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
  if(!res||!res.ok)return null;
  try{return await res.json();}catch(e){return null;}
}

async function pushToDrive(data){
  const fileId=await findOrCreateFile();
  if(!fileId)return false;
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const res=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{
    method:'PATCH',
    headers:{Authorization:'Bearer '+gToken,'Content-Type':'application/json'},
    body:JSON.stringify(data)
  });
  return res&&res.ok;
}

// ── Merge logic: newest wins, arrays union ──────────────────────────
function mergeData(local, remote){
  if(!remote||typeof remote!=='object')return local;
  const merged={...local};
  // completed: keep done=true if either has it
  merged.completed={...remote.completed,...local.completed};
  Object.keys(remote.completed||{}).forEach(k=>{
    if(remote.completed[k]?.done&&!local.completed?.[k]?.done)
      merged.completed[k]=remote.completed[k];
  });
  // vocab: union by word
  const vocabMap={};
  [...(remote.vocab||[]),...(local.vocab||[])].forEach(v=>{
    vocabMap[v.word.toLowerCase()]=v;
  });
  merged.vocab=Object.values(vocabMap);
  // highlighted, links, notes: merge objects
  merged.highlighted={...(remote.highlighted||{}),...local.highlighted};
  merged.links={...(remote.links||{}),...local.links};
  merged.notes={...(remote.notes||{}),...local.notes};
  // dailyLog: union arrays per day
  merged.dailyLog={...(remote.dailyLog||{})};
  Object.keys(local.dailyLog||{}).forEach(d=>{
    const rem=remote.dailyLog?.[d]||[];
    const loc=local.dailyLog[d]||[];
    merged.dailyLog[d]=[...new Set([...rem,...loc])];
  });
  // studyHours: keep max per day
  merged.studyHours={...(remote.studyHours||{})};
  Object.keys(local.studyHours||{}).forEach(d=>{
    merged.studyHours[d]=Math.max(local.studyHours[d]||0,remote.studyHours?.[d]||0);
  });
  // customSubjects, customTopics, customSubtopics: union by id
  ['customSubjects','customTopics','customSubtopics','alarms'].forEach(key=>{
    const map={};
    [...(remote[key]||[]),...(local[key]||[])].forEach(item=>{if(item.id)map[item.id]=item;});
    merged[key]=Object.values(map);
  });
  // hiddenSubtopics: union
  merged.hiddenSubtopics=[...new Set([...(remote.hiddenSubtopics||[]),...(local.hiddenSubtopics||[])])];
  // user: keep local if set
  merged.user=local.user||remote.user||null;
  return merged;
}

// ── Main sync function ───────────────────────────────────────────────
async function syncNow(isInitial=false){
  if(!gToken){setSyncStatus('off','Not synced');return;}
  setSyncStatus('syncing','Syncing…');
  try{
    // 1. Pull remote
    const remote=await pullFromDrive();
    // 2. Merge
    const merged=mergeData(S, remote||{});
    Object.assign(S,merged);
    save();
    // 3. Push merged back
    await pushToDrive(S);
    lastSyncTime=new Date();
    const t=lastSyncTime.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    setSyncStatus('ok',`Synced ${t}`);
    if(isInitial)renderAll();
    else updateHeader();
  }catch(err){
    setSyncStatus('error','Sync failed');
    console.error('Sync error',err);
  }
}

function startAutoSync(){
  if(syncInterval)clearInterval(syncInterval);
  syncInterval=setInterval(()=>syncNow(),60000); // every 60s
}

// ── Hook save() to trigger sync ─────────────────────────────────────
const _origSave=save;
window._syncTimeout=null;
save=function(){
  _origSave();
  if(gToken){
    clearTimeout(window._syncTimeout);
    window._syncTimeout=setTimeout(()=>syncNow(),3000); // debounce 3s after save
  }
};

        <button class="btn btn-red btn-sm" onclick="deleteHistory('all')">🗑 RESET</button>
      </div>
    </div>
    <div class="mda">
      <button class="btn" onclick="autoDailyBackup()">💾 Backup First</button>
      <button class="btn btn-primary" onclick="closeModal()">Close</button>
    </div>`);
}

window.deleteHistory=function(type){
  if(type==='hidden'){S.hiddenSubtopics=[];save();closeModal();renderAll();toast('↩️ Restored hidden subtopics','var(--green)');return;}
  if(!confirm('Are you sure? This cannot be undone!'))return;
  if(type==='daily'){S.dailyLog={};}
  else if(type==='completed'){S.completed={};}
  else if(type==='hours'){S.studyHours={};}
  else if(type==='vocab'){S.vocab=[];}
  else if(type==='all'){
    S.completed={};S.dailyLog={};S.studyHours={};S.vocab=[];S.highlighted={};S.links={};S.notes={};
    S.customSubtopics=[];S.customTopics=[];S.customSubjects=[];S.alarms=[];S.hiddenSubtopics=[];
  }
  save();closeModal();renderAll();toast('🗑️ Deleted','var(--red)');
}

// Inject custom topics into SUBJECTS
function getTopicsForSection(secId){
  const builtins=SUBJECTS[secId]||[];
  const custom=S.customTopics.filter(t=>t.subjectId===secId).map(t=>({
    ...t,subtopics:[],isCustom:true
  }));
  return [...builtins,...custom];
}

// ===== INIT =====
renderAll();
</script>
